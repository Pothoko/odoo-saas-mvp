---
# Traefik middleware: set X-Forwarded-Proto and other Odoo-required headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-headers
  namespace: kube-system
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"

---
# Traefik IngressRoute for the portal itself
# portal.aeisoftware.com → portal service port 8000
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portal-ingress
  namespace: aeisoftware
spec:
  entryPoints: [web]
  routes:
    - match: Host(`portal.aeisoftware.com`)
      kind: Rule
      services:
        - name: portal
          port: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: aeisoftware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: saas-portal
      containers:
        - name: portal
          image: ghcr.io/jpvargassoruco/odoo-saas-mvp/portal:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres.aeisoftware.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: odoo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secret
                  key: API_KEY
            - name: BASE_DOMAIN
              value: aeisoftware.com
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: aeisoftware
spec:
  selector:
    app: portal
  ports:
    - port: 8000
      targetPort: 8000
