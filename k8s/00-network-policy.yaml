# =============================================================================
# 00-network-policy.yaml — NetworkPolicies namespace aeisoftware
# Fase 2: PostgreSQL HA externo en 192.168.0.0/24 via HAProxy
# =============================================================================
---
# Default Deny — bloquea todo excepto lo explícitamente permitido
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aeisoftware
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow Portal: recibe tráfico de Traefik (kube-system) y odoo-admin
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-portal-ingress
  namespace: aeisoftware
spec:
  podSelector:
    matchLabels:
      app: portal
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: odoo-admin
    ports:
    - protocol: TCP
      port: 8000

---
# Allow Egress a DNS (CoreDNS en kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: aeisoftware
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# Allow Egress HTTPS externo (GitHub addons, Cloudflare, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-https
  namespace: aeisoftware
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443

---
# ── FASE 2 ───────────────────────────────────────────────────────────────────
# Allow Egress al clúster PostgreSQL HA externo
# HAProxy escucha en los 3 nodos: 192.168.0.127, .186, .226
# :5000 Primary (RW directo) | :5001 Replicas (RO) | :5002 PgBouncer (pool)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-pg-ha
  namespace: aeisoftware
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 192.168.0.0/24
    ports:
    - protocol: TCP
      port: 5000
    - protocol: TCP
      port: 5001
    - protocol: TCP
      port: 5002
