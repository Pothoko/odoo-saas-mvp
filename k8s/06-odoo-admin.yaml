---
# Single shared Odoo 18 instance for admin use (admin.aeisoftware.com)
# Includes the odoo_k8s_saas addon, cloned from GitHub on each pod start.
apiVersion: v1
kind: Namespace
metadata:
  name: odoo-admin
  labels:
    managed-by: manual

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo-admin-data
  namespace: odoo-admin
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
# Secret holding the real passwords for the admin Odoo instance.
# DB_PASSWORD must match POSTGRES_PASSWORD in namespace aeisoftware.
# To regenerate a value: echo -n "$(openssl rand -base64 24)" | base64
apiVersion: v1
kind: Secret
metadata:
  name: odoo-admin-secret
  namespace: odoo-admin
type: Opaque
data:
  DB_PASSWORD: QWVpc29mdHdhcmUyMDI2Kw==
  ADMIN_PASSWD: QWVpc29mdHdhcmUyMDI2Kw==

---
# ConfigMap stores the odoo.conf TEMPLATE.
# ${DB_PASSWORD} and ${ADMIN_PASSWD} are substituted at startup by the
# render-config init container using envsubst.
apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-admin-conf
  namespace: odoo-admin
data:
  odoo.conf.tmpl: |
    [options]
    db_host = postgres.aeisoftware.svc.cluster.local
    db_port = 5432
    db_user = odoo
    db_password = ${DB_PASSWORD}
    admin_passwd = ${ADMIN_PASSWD}
    dbfilter = ^admin$
    list_db = True
    addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    data_dir = /var/lib/odoo
    workers = 1
    max_cron_threads = 1
    gevent_port = 8072
    proxy_mode = True

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-admin
  namespace: odoo-admin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: odoo-admin
  template:
    metadata:
      labels:
        app: odoo-admin
    spec:
      initContainers:
        # 1. Clone the SaaS addon from GitHub
        - name: copy-addon
          image: alpine/git
          command:
            - sh
            - -c
            - |
              git clone --depth=1 https://github.com/jpvargassoruco/odoo-saas-mvp.git /tmp/repo
              cp -r /tmp/repo/odoo_k8s_saas /mnt/extra-addons/
              echo "Addon copied OK"
          volumeMounts:
            - name: odoo-addons
              mountPath: /mnt/extra-addons

        # 2. Render odoo.conf from template, injecting real secret values
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext >/dev/null 2>&1
              envsubst < /tmpl/odoo.conf.tmpl > /etc/odoo/odoo.conf
              echo "odoo.conf rendered:"
              cat /etc/odoo/odoo.conf
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-admin-secret
                  key: DB_PASSWORD
            - name: ADMIN_PASSWD
              valueFrom:
                secretKeyRef:
                  name: odoo-admin-secret
                  key: ADMIN_PASSWD
          volumeMounts:
            - name: odoo-conf-tmpl
              mountPath: /tmpl
            - name: odoo-conf-rendered
              mountPath: /etc/odoo

      containers:
        - name: odoo
          image: odoo:18
          ports:
            - containerPort: 8069
            - containerPort: 8072
          env:
            - name: SAAS_PORTAL_URL
              value: "http://portal.aeisoftware.svc.cluster.local:8000"
            - name: SAAS_PORTAL_KEY
              valueFrom:
                secretKeyRef:
                  name: portal-secret
                  key: API_KEY
                  optional: true
          volumeMounts:
            - name: odoo-conf-rendered
              mountPath: /etc/odoo
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-addons
              mountPath: /mnt/extra-addons
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi

      volumes:
        - name: odoo-conf-tmpl
          configMap:
            name: odoo-admin-conf
        - name: odoo-conf-rendered
          emptyDir: {}
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-admin-data
        - name: odoo-addons
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: odoo-admin-svc
  namespace: odoo-admin
spec:
  selector:
    app: odoo-admin
  ports:
    - name: http
      port: 8069
      targetPort: 8069
    - name: longpoll
      port: 8072
      targetPort: 8072

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-admin-ingress
  namespace: odoo-admin
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: admin.aeisoftware.com
      http:
        paths:
          - path: /websocket
            pathType: Prefix
            backend:
              service:
                name: odoo-admin-svc
                port:
                  number: 8072
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odoo-admin-svc
                port:
                  number: 8069
