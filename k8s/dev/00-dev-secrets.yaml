# ─── Dev-only secrets ───────────────────────────────────────────────────────
# These override k8s/01-secrets.yaml with local dev values.
# Never commit real tokens here; this file is git-tracked intentionally with
# dummy values that are safe for local-only use.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: aeisoftware
type: Opaque
stringData:
  POSTGRES_PASSWORD: "DevPass2026!"

---
apiVersion: v1
kind: Secret
metadata:
  name: portal-secret
  namespace: aeisoftware
type: Opaque
stringData:
  API_KEY: "dev-api-key-local"

# portal-secret also needed in odoo-admin namespace
---
apiVersion: v1
kind: Secret
metadata:
  name: portal-secret
  namespace: odoo-admin
type: Opaque
stringData:
  API_KEY: "dev-api-key-local"

---
apiVersion: v1
kind: Secret
metadata:
  name: odoo-admin-secret
  namespace: odoo-admin
type: Opaque
stringData:
  ADMIN_PASSWORD: "admin"
