[options]
; =============================================================================
; odoo-dev.conf — Configuración de Odoo para ambiente de desarrollo local
;
; Diferencias vs producción:
;   - db_host apunta al servicio "postgres" de Docker Compose (no al HA externo)
;   - db_port es 5432 (no 5002)
;   - workers = 0 (modo single-thread, más fácil de depurar)
;   - proxy_mode desactivado (no hay Traefik)
; =============================================================================

db_host = postgres
db_port = 5432
db_user = odoo
db_password = DevPass2026!
admin_passwd = admin
dbfilter = ^admin$
list_db = True
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; workers=0 usa el servidor multi-thread simple en lugar de multi-proceso
; (más fácil de depurar con logs directos)
workers = 0
max_cron_threads = 1

; log_level = debug  ; descomentar si necesitas logs detallados
