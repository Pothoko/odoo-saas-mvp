# =============================================================================
# k8s/01-secrets.yaml — PLACEHOLDER ONLY
#
# Real secret values are NEVER stored here.
# They are applied at deploy time by infra/apply-manifests.sh, which reads
# from .secrets.env (gitignored) and injects them via `kubectl apply --dry-run`.
#
# To bootstrap a new cluster:
#   cp .secrets.env.example .secrets.env
#   # edit .secrets.env with real passwords
#   ./infra/apply-manifests.sh
# =============================================================================
#
# This file intentionally contains no Secret resources.
# See infra/apply-manifests.sh for how secrets are applied.
