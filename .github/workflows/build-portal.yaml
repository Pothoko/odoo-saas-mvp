name: Build & Push Portal

on:
  push:
    branches: [main]
    paths:
      - portal/**
      - .github/workflows/build-portal.yaml

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/odoo-saas-mvp/portal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: portal
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: Deployment is handled locally on the VM via:
      #   docker build -t portal:latest portal/
      #   docker save portal:latest | sudo k3s ctr images import -
      #   kubectl -n aeisoftware rollout restart deployment/portal
      # The VM is behind Cloudflare Tunnel and doesn't expose SSH publicly.
