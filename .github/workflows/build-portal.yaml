name: Build & Push Portal

on:
  push:
    branches: [main]
    paths:
      - portal/**
      - .github/workflows/build-portal.yaml

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/odoo-saas-mvp/portal

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: portal
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Restart portal deployment on cluster
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            kubectl -n aeisoftware rollout restart deployment/portal
            kubectl -n aeisoftware rollout status deployment/portal --timeout=120s
