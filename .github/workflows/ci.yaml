name: CI — K3s HA Stack

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main, "feature/*"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Push imagen del portal
  # ─────────────────────────────────────────────────────────────────────────────
  build-portal:
    name: Build & Push Portal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize ref name for Docker tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: portal
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/odoo-saas-mvp/portal:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/odoo-saas-mvp/portal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy automático al clúster K3s HA (solo en push a main)
  #
  # Requiere secretos en GitHub:
  #   KUBECONFIG_B64  — base64 del kubeconfig apuntando al VIP 192.168.0.150
  #   DB_PASSWORD     — contraseña del usuario odoo en PG HA
  #   ADMIN_PASSWD    — master password de Odoo
  #   API_KEY         — API key del portal
  #   CLOUDFLARE_TUNNEL_TOKEN — token del túnel Cloudflare
  #
  # Para generar KUBECONFIG_B64 (una vez desplegado el clúster):
  #   base64 -w0 infra/k3s-ha/.kubeconfig
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-portal:
    name: Deploy Portal → K3s HA
    needs: build-portal
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Apply K8s manifests (secrets + resources)
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ADMIN_PASSWD: ${{ secrets.ADMIN_PASSWD }}
          API_KEY: ${{ secrets.API_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          # Crear .secrets.env temporal en memoria (no se persiste)
          cat > /tmp/secrets.env << EOF
          DB_PASSWORD=${DB_PASSWORD}
          ADMIN_PASSWD=${ADMIN_PASSWD}
          API_KEY=${API_KEY}
          CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
          EOF

          # Usar apply-manifests.sh para inyectar secretos y aplicar manifests
          SECRETS_FILE=/tmp/secrets.env bash infra/apply-manifests.sh

          # Limpiar
          rm -f /tmp/secrets.env

      - name: Rollout restart portal (nueva imagen)
        run: |
          kubectl -n aeisoftware rollout restart deployment/portal
          kubectl -n aeisoftware rollout status deployment/portal --timeout=180s

      - name: Verify portal endpoint
        run: |
          echo "→ Verificando portal pod..."
          kubectl -n aeisoftware get pods -l app=portal
          echo ""
          echo "→ Endpoints postgres (PG HA):"
          kubectl -n aeisoftware get endpoints postgres
          echo ""
          echo "→ StorageClasses:"
          kubectl get storageclasses

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy exitoso — Portal actualizado en https://portal.aeisoftware.com"
          else
            echo "❌ Deploy fallido — revisar logs"
          fi
